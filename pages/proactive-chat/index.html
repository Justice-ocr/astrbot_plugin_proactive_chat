<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>主动消息管理端</title>
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="preload" href="./fonts/outfit.css" as="style">
    <link href="./fonts/outfit.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script>
        window.__PROACTIVE_AUTH_PENDING = true;
        window.__PROACTIVE_AUTH_READY = false;
        window.__PROACTIVE_PAGE_MODE = true;
        window.__PROACTIVE_BOOT_STAGE = "bootstrap";
        window.showProactiveBootError = function (msg) {
            console.error("[ProactivePage] " + msg);
            var text = document.getElementById("boot-text");
            if (text) {
                text.textContent = msg;
                text.style.color = "#B3261E";
            }
        };
        window.setProactiveBootStage = function (stage) {
            window.__PROACTIVE_BOOT_STAGE = stage;
            var text = document.getElementById("boot-text");
            if (text) {
                text.textContent = "正在加载 " + stage + "...";
                text.style.color = "";
            }
        };
        window.proactiveScriptLoadError = function (stage) {
            window.showProactiveBootError("脚本加载失败: " + stage);
        };
        window.addEventListener("error", function (event) {
            var stage = window.__PROACTIVE_BOOT_STAGE || "unknown";
            var rawMessage = event && event.message ? event.message : "页面脚本加载失败";
            var message = rawMessage === "Script error."
                ? "脚本执行失败: " + stage
                : "脚本执行失败: " + stage + " - " + rawMessage;
            window.showProactiveBootError(message);
        });
        window.addEventListener("unhandledrejection", function (event) {
            var stage = window.__PROACTIVE_BOOT_STAGE || "unknown";
            var reason = event && event.reason;
            var message = reason && reason.message ? reason.message : "页面初始化失败";
            window.showProactiveBootError("异步初始化失败: " + stage + " - " + message);
        });
    </script>
    <script>
        window.setProactiveBootStage("bridge-sdk");
    </script>
    <script src="/api/plugin/page/bridge-sdk.js" onerror="window.proactiveScriptLoadError('bridge-sdk')"></script>
    <script>
        window.setProactiveBootStage("vendor globals");
        (function () {
            var originalDefine = window.define;
            var originalAmd = originalDefine && originalDefine.amd;

            window.__PROACTIVE_RESTORE_AMD_DEFINE = function () {
                try {
                    if (originalDefine) {
                        window.define = originalDefine;
                        originalDefine.amd = originalAmd;
                    } else {
                        delete window.define;
                    }
                } catch (e) {
                    window.define = originalDefine;
                }
            };

            if (originalDefine && originalDefine.amd) {
                try {
                    window.define = undefined;
                } catch (e) {
                    try {
                        originalDefine.amd = undefined;
                    } catch (ignored) {}
                }
            }
        })();
    </script>
</head>

<body>
    <div id="loading-skeleton" class="boot-loader">
        <div class="boot-loader__logo">
            <img src="./logo.png" alt="logo">
        </div>
        <div class="boot-loader__title">主动消息管理端</div>
        <div class="boot-loader__subtitle" id="boot-text">正在初始化...</div>
        <div class="boot-loader__progress">
            <div class="boot-loader__progress-bar"></div>
        </div>
    </div>

    <div id="root"></div>

    <script>window.setProactiveBootStage("react");</script>
    <script src="./vendor/react.production.min.js" onerror="window.proactiveScriptLoadError('react')"></script>
    <script>window.setProactiveBootStage("react-dom");</script>
    <script src="./vendor/react-dom.production.min.js" onerror="window.proactiveScriptLoadError('react-dom')"></script>
    <script>window.setProactiveBootStage("emotion-react");</script>
    <script src="./vendor/emotion-react.umd.min.js" onerror="window.proactiveScriptLoadError('emotion-react')"></script>
    <script>window.setProactiveBootStage("emotion-styled");</script>
    <script src="./vendor/emotion-styled.umd.min.js" onerror="window.proactiveScriptLoadError('emotion-styled')"></script>
    <script>window.setProactiveBootStage("material-ui");</script>
    <script src="./vendor/material-ui.production.min.js" onerror="window.proactiveScriptLoadError('material-ui')"></script>
    <script>window.setProactiveBootStage("marked");</script>
    <script src="./vendor/marked.min.js" onerror="window.proactiveScriptLoadError('marked')"></script>
    <script>window.setProactiveBootStage("dompurify");</script>
    <script src="./vendor/purify.min.js" onerror="window.proactiveScriptLoadError('dompurify')"></script>
    <script>window.setProactiveBootStage("app");</script>
    <script src="./app.js" onerror="window.proactiveScriptLoadError('app')"></script>
    <script>
        if (typeof window.__PROACTIVE_RESTORE_AMD_DEFINE === "function") {
            window.__PROACTIVE_RESTORE_AMD_DEFINE();
        }
        window.setProactiveBootStage("page bridge");
    </script>
    <script>
        (function () {
            function proceed() {
                window.__PROACTIVE_AUTH_PENDING = false;
                window.__PROACTIVE_AUTH_READY = true;
                window.dispatchEvent(new Event("auth-ready"));

                setTimeout(function () {
                    var skeleton = document.getElementById("loading-skeleton");
                    if (skeleton) {
                        skeleton.classList.add("is-exiting");
                        setTimeout(function () {
                            if (skeleton.parentNode) skeleton.parentNode.removeChild(skeleton);
                        }, 300);
                    }
                }, 500);
            }

            var bridge = window.AstrBotPluginPage;
            if (!bridge) {
                window.showProactiveBootError("AstrBot 插件页面桥接未就绪");
                return;
            }

            var ready = typeof bridge.ready === "function" ? bridge.ready() : Promise.resolve();
            ready
                .then(function () {
                    if (window.AuthUtil) {
                        window.AuthUtil.setToken("page-bridge");
                    }
                    proceed();
                })
                .catch(function (err) {
                    window.showProactiveBootError(
                        err && err.message ? err.message : "AstrBot 插件页面桥接初始化失败"
                    );
                });
        })();
    </script>
</body>

</html>
